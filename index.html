<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <div class="min-h-screen flex flex-col items-center p-6">
    <h1 class="text-3xl font-bold mb-6">🚀 Mis Aplicaciones</h1>

    <div id="appContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 w-full max-w-4xl"></div>
  </div>

  <script>
    // 🔧 CONFIGURACIÓN
    const config = {
      "jnv-cut": "membrane",
      "evaluacion": "paper",
      "googlemap": "map",
      "jm-ranking": "bars"
    };

    // 📁 Carpetas (puedes mantener esto manual o hacerlo dinámico luego)
    const apps = [
      "jnv-cut",
      "evaluacion",
      "googlemap",
      "jm-ranking"
    ];

    // 🎨 SVG ICONOS
    const icons = {
      membrane: `
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="12" r="9" stroke-width="2"/>
          <circle cx="12" cy="12" r="4" stroke-width="2"/>
        </svg>
      `,
      paper: `
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <rect x="6" y="4" width="12" height="16" rx="2" stroke-width="2"/>
          <line x1="8" y1="8" x2="16" y2="8" stroke-width="2"/>
          <line x1="8" y1="12" x2="16" y2="12" stroke-width="2"/>
        </svg>
      `,
      map: `
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path d="M9 4l6 2 6-2v16l-6 2-6-2-6 2V6l6-2z" stroke-width="2"/>
        </svg>
      `,
      bars: `
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <rect x="4" y="10" width="3" height="10" stroke-width="2"/>
          <rect x="10" y="6" width="3" height="14" stroke-width="2"/>
          <rect x="16" y="2" width="3" height="18" stroke-width="2"/>
        </svg>
      `,
      default: `
        <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="16">?</text>
        </svg>
      `
    };

    const container = document.getElementById("appContainer");

    apps.forEach(app => {
      const iconKey = config[app] || "default";
      const icon = icons[iconKey] || icons["default"];

      const card = document.createElement("a");
      card.href = `./${app}/`; // enlace a la carpeta
      card.className = "bg-white rounded-2xl shadow p-6 flex flex-col items-center hover:shadow-lg transition";

      card.innerHTML = `
        <div class="mb-4 text-blue-600">${icon}</div>
        <div class="text-lg font-semibold capitalize">${app.replace("-", " ")}</div>
      `;

      container.appendChild(card);
    });
  </script>

</body>
</html>
