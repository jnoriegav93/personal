<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script>
    tailwind.config = {
      darkMode: 'class'
    }
  </script>

  <style>
    .glass {
      backdrop-filter: blur(14px);
      background: rgba(255, 255, 255, 0.65);
    }

    .dark .glass {
      background: rgba(30, 41, 59, 0.65);
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-100 to-indigo-200 dark:from-gray-900 dark:to-gray-800 transition">

  <!-- APP CONTAINER -->
  <div class="max-w-md mx-auto min-h-screen flex flex-col">

    <!-- HEADER (tipo app móvil) -->
    <header class="flex items-center justify-between px-4 pt-6 pb-4">
      <h1 class="text-xl font-bold text-gray-800 dark:text-white">
        🚀 Apps
      </h1>

      <button id="themeToggle"
        class="w-10 h-10 flex items-center justify-center rounded-xl glass shadow">
        🌙
      </button>
    </header>

    <!-- CONTENIDO -->
    <main class="flex-1 px-4 pb-6">

      <div class="glass rounded-3xl p-4 shadow-lg">

        <div id="appContainer"
          class="grid grid-cols-2 gap-4 sm:grid-cols-3">
        </div>

      </div>

    </main>

  </div>

  <script>
    // 🌙 DARK MODE
    const html = document.documentElement;
    const toggle = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "dark") {
      html.classList.add("dark");
    }

    toggle.addEventListener("click", () => {
      html.classList.toggle("dark");
      localStorage.setItem("theme",
        html.classList.contains("dark") ? "dark" : "light"
      );
    });

    // 🔧 CONFIG
    const config = {
      "jnv-cut": "membrane",
      "evaluacion": "paper",
      "googlemap": "map",
      "jm-ranking": "bars"
    };

    const apps = [
      "jnv-cut",
      "evaluacion",
      "googlemap",
      "jm-ranking"
    ];

    // 🎨 ICONOS
    const icons = {
      membrane: `
        <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="9"/>
          <circle cx="12" cy="12" r="4"/>
        </svg>
      `,
      paper: `
        <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/>
        </svg>
      `,
      map: `
        <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M9 4l6 2 6-2v16l-6 2-6-2-6 2V6l6-2z"/>
        </svg>
      `,
      bars: `
        <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M4 20V10M10 20V6M16 20V2"/>
        </svg>
      `,
      default: `
        <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      `
    };

    const container = document.getElementById("appContainer");

    apps.forEach(app => {
      const iconKey = config[app] || "default";
      const icon = icons[iconKey] || icons["default"];

      const card = document.createElement("a");
      card.href = `./${app}/`;

      card.className = `
        flex flex-col items-center justify-center
        p-4 rounded-2xl
        glass shadow
        active:scale-95
        transition
      `;

      card.innerHTML = `
        <div class="text-blue-600 dark:text-blue-400 mb-2">
          ${icon}
        </div>

        <span class="text-sm font-medium text-gray-800 dark:text-white text-center capitalize">
          ${app.replace("-", " ")}
        </span>
      `;

      container.appendChild(card);
    });

    // 🔌 SERVICE WORKER
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>

</body>
</html>
