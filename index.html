<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Aplicaciones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    /* 🌌 ESPACIO EXTERIOR */
    body {
      background: radial-gradient(circle at 50% 50%, #020617 0%, #000000 100%);
      overflow-x: hidden;
    }

    /* ⭐ estrellas */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
      background-size: 3px 3px, 2px 2px;
      background-position: 0 0, 50px 50px;
      opacity: 0.15;
      z-index: -3;
    }

    /* 🌌 nebulosa animada */
    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(circle at 30% 40%, #3b82f655, transparent 60%),
        radial-gradient(circle at 70% 60%, #a855f755, transparent 60%);
      filter: blur(100px);
      animation: galaxyMove 30s ease-in-out infinite alternate;
      z-index: -2;
    }

    @keyframes galaxyMove {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(-5%, 5%) scale(1.1); }
    }

    /* 🧊 GLASS */
    .glass {
      position: relative;
      backdrop-filter: blur(20px) saturate(180%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
    }

    /* 💡 reflejo dinámico */
    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        circle at var(--x, 50%) var(--y, 50%),
        rgba(255,255,255,0.25),
        transparent 40%
      );
      opacity: 0;
      transition: opacity 0.3s;
    }

    .glass:hover::before {
      opacity: 1;
    }

    /* ✨ animaciones */
    .fade-in {
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body class="min-h-screen text-gray-100 transition">

  <div class="max-w-md mx-auto min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="flex items-center justify-between px-4 pt-6 pb-4">

      <div class="flex items-center gap-3">
        <img src="icon-192.png" class="w-10 h-10 rounded-xl shadow">
        <h1 class="text-lg font-semibold">Mis Aplicaciones</h1>
      </div>

      <button id="themeToggle"
        class="w-10 h-10 flex items-center justify-center rounded-xl glass shadow">
        🌙
      </button>

    </header>

    <!-- CONTENIDO -->
    <main class="flex-1 px-4 pb-6">

      <div class="glass rounded-3xl p-4 shadow-xl">

        <div id="appContainer"
          class="grid grid-cols-2 gap-4 sm:grid-cols-3">
        </div>

      </div>

    </main>

  </div>

  <script>
    const USER = "jnoriegav93";
    const REPO = "personal";

    const html = document.documentElement;
    const toggle = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "dark") {
      html.classList.add("dark");
    }

    toggle.addEventListener("click", () => {
      html.classList.toggle("dark");
      localStorage.setItem("theme",
        html.classList.contains("dark") ? "dark" : "light"
      );
    });

    const icons = {
      default: `
        <svg class="w-10 h-10 opacity-70" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      `
    };

    const container = document.getElementById("appContainer");

    async function loadApps() {
      const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents`);
      const data = await res.json();

      const folders = data.filter(item =>
        item.type === "dir" &&
        !item.name.startsWith(".")
      );

      folders.forEach((folder, i) => {

        const card = document.createElement("a");
        card.href = `./${folder.name}/`;

        card.className = `
          glass flex flex-col items-center justify-center
          p-4 rounded-2xl
          shadow-xl
          transition duration-300
          hover:scale-105 hover:shadow-2xl
          active:scale-95
          fade-in
        `;

        card.style.animationDelay = `${i * 0.05}s`;

        card.innerHTML = `
          <img src="./${folder.name}/icon.png"
               onerror="this.replaceWith(createFallbackIcon())"
               class="w-10 h-10 mb-2 rounded-lg opacity-80"/>

          <span class="text-sm font-medium text-center capitalize text-white/80">
            ${folder.name.replace("-", " ")}
          </span>
        `;

        // 💡 reflejo dinámico
        card.addEventListener("mousemove", e => {
          const rect = card.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          card.style.setProperty("--x", x + "%");
          card.style.setProperty("--y", y + "%");
        });

        container.appendChild(card);
      });
    }

    function createFallbackIcon() {
      const div = document.createElement("div");
      div.innerHTML = icons.default;
      return div;
    }

    loadApps();

    // 🪐 PARALLAX GLOBAL
    document.addEventListener("mousemove", e => {
      const x = (e.clientX / window.innerWidth - 0.5) * 10;
      const y = (e.clientY / window.innerHeight - 0.5) * 10;

      document.body.style.transform =
        `translate(${x * -0.3}px, ${y * -0.3}px)`;
    });

    // 🔌 SERVICE WORKER
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>

</body>
</html>
