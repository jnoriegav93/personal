<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mis Aplicaciones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    /* fondo tech */
    body {
      background: radial-gradient(circle at 20% 20%, #60a5fa40, transparent),
                  radial-gradient(circle at 80% 30%, #818cf840, transparent),
                  radial-gradient(circle at 50% 80%, #22d3ee30, transparent);
    }

    .dark body {
      background: radial-gradient(circle at 20% 20%, #1e3a8a40, transparent),
                  radial-gradient(circle at 80% 30%, #312e8140, transparent),
                  radial-gradient(circle at 50% 80%, #0f172a, #020617);
    }

    .glass {
      backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.6);
    }

    .dark .glass {
      background: rgba(15, 23, 42, 0.6);
    }

    /* animaciones */
    .fade-in {
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="min-h-screen text-gray-800 dark:text-gray-100 transition">

  <div class="max-w-md mx-auto min-h-screen flex flex-col">

    <!-- HEADER -->
    <header class="flex items-center justify-between px-4 pt-6 pb-4">

      <div class="flex items-center gap-3">
        <img src="icon-192.png" class="w-10 h-10 rounded-xl shadow">
        <h1 class="text-lg font-semibold">
          Mis Aplicaciones
        </h1>
      </div>

      <button id="themeToggle"
        class="w-10 h-10 flex items-center justify-center rounded-xl glass shadow">
        🌙
      </button>

    </header>

    <!-- CONTENIDO -->
    <main class="flex-1 px-4 pb-6">

      <div class="glass rounded-3xl p-4 shadow-xl">

        <div id="appContainer"
          class="grid grid-cols-2 gap-4 sm:grid-cols-3">
        </div>

      </div>

    </main>

  </div>

  <script>
    const USER = "jnoriegav93";
    const REPO = "personal";

    // 🌙 DARK MODE
    const html = document.documentElement;
    const toggle = document.getElementById("themeToggle");

    if (localStorage.getItem("theme") === "dark") {
      html.classList.add("dark");
    }

    toggle.addEventListener("click", () => {
      html.classList.toggle("dark");
      localStorage.setItem("theme",
        html.classList.contains("dark") ? "dark" : "light"
      );
    });

    // 🎨 ICONOS fallback
    const icons = {
      default: `
        <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
        </svg>
      `
    };

    const container = document.getElementById("appContainer");

    // 🚀 DETECCIÓN AUTOMÁTICA DE CARPETAS
    async function loadApps() {
      const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents`);
      const data = await res.json();

      const folders = data.filter(item =>
        item.type === "dir" &&
        !item.name.startsWith(".")
      );

      folders.forEach((folder, i) => {

        const card = document.createElement("a");
        card.href = `./${folder.name}/`;

        card.className = `
          flex flex-col items-center justify-center
          p-4 rounded-2xl
          glass shadow
          active:scale-95
          transition
          fade-in
        `;

        card.style.animationDelay = `${i * 0.05}s`;

        card.innerHTML = `
          <img src="./${folder.name}/icon.png"
               onerror="this.replaceWith(createFallbackIcon())"
               class="w-10 h-10 mb-2 rounded-lg"/>

          <span class="text-sm font-medium text-center capitalize">
            ${folder.name.replace("-", " ")}
          </span>
        `;

        container.appendChild(card);
      });
    }

    // fallback icon dinámico
    function createFallbackIcon() {
      const div = document.createElement("div");
      div.innerHTML = icons.default;
      return div;
    }

    loadApps();

    // 🔌 SERVICE WORKER
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>

</body>
</html>
